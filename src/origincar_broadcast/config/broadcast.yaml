broadcast_manager:
  ros__parameters:
    source_topics:
      - /announcement
      - /image_description
      - /image_ai
    source_names:
      - announcement
      - image_description
      - image_ai
    source_priorities:
      - 80
      - 60
      - 60
    source_cooldowns_sec:
      - 1.0
      - 8.0
      - 8.0
