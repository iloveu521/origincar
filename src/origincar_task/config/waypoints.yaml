# Competition Waypoints
# Coordinate system: cropped SLAM map frame from origincar_base/map/map.yaml
# Source coordinates were field coordinates with origin (0,0) at bottom-left of 5m×5m field.
# Mapping applied on 2026-07-07 after cropping SLAM map:
#   map_x = field_x - 0.481
#   map_y = field_y - 0.463
# Resolution: 0.02 m/pixel
# Note: coordinates are approximate, must be verified against actual field/RViz.

# ===== Key Points =====
waypoints:
  point_P:
    x: 0.019
    y: -0.163
    yaw: 0.0
    description: "发车/停车点 P (Area A, bottom-left)"

  qr_point:
    x: 4.019
    y: 1.237
    yaw: 0.0
    description: "QR 任务发布点 (Area A, top-right)"

