slam_toolbox:
  ros__parameters:
    # EKF-free mapping: odom_tf_node converts /odom into TF odom -> base_link.
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_sim_time: false

    mode: mapping

    # RDK X5 low-memory settings. LSN10 is about 10 Hz; process about 1-2 Hz.
    throttle_scans: 4
    minimum_time_interval: 0.5
    transform_timeout: 1.0
    tf_buffer_duration: 60.0
    transform_publish_period: 0.1
    map_update_interval: 0.1

    resolution: 0.05
    min_laser_range: 0.21
    max_laser_range: 8.0

    minimum_travel_distance: 0.15
    minimum_travel_heading: 0.25

    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Disable loop closure for first low-memory mapping test. Enable later if memory is stable.
    do_loop_closing: false
    scan_buffer_size: 5
    scan_buffer_maximum_scan_distance: 8.0
